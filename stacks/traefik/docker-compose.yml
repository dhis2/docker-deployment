# Standalone Traefik gateway stack for multi-instance deployments.
#
# Deploy this stack once before launching any DHIS2 instances:
#   make start-traefik
#
# Routes are added automatically to traefik/conf.d/ by `make start-instance`
# and removed by `make stop-instance`. Traefik watches the directory and reloads
# within ~1 second of any change — no restart required.
#
# The proxy external network must exist before starting this stack:
#   make ensure-networks

services:
  traefik-init:
    image: alpine:3.22
    volumes:
      - cert:/cert:rw
      - ../../scripts/init-cert.sh:/init-cert.sh:ro
    command: [ "/init-cert.sh" ]
    security_opt:
      - no-new-privileges:true

  traefik:
    image: traefik:v3.5
    depends_on:
      traefik-init:
        condition: service_completed_successfully
    volumes:
      - ./conf.d:/etc/traefik/conf.d:ro
      - cert:/cert:rw
      - ../../overlays/wireguard/certs:/etc/traefik/certs:ro
    environment:
      # -- Log level
      TRAEFIK_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # -- Enable access logs
      TRAEFIK_ACCESSLOG: ${LOG_ACCESS:-true}
      # -- Access log format
      TRAEFIK_ACCESSLOG_FORMAT: ${LOG_FORMAT:-json}
      # -- Allow ping
      TRAEFIK_PING: true
      # -- HTTP entrypoint — redirect all traffic to HTTPS
      TRAEFIK_ENTRYPOINTS_WEB_ADDRESS: :80
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_TO: websecure
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_SCHEME: https
      # -- HTTPS entrypoint
      TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS: :443
      # -- Watch conf.d/ for route changes (picks up new instances within ~1s)
      TRAEFIK_PROVIDERS_FILE_DIRECTORY: /etc/traefik/conf.d
      TRAEFIK_PROVIDERS_FILE_WATCH: true
      # -- Disable Docker provider (no socket access)
      TRAEFIK_API: false
      TRAEFIK_API_INSECURE: false
      # -- Enable Prometheus metrics
      TRAEFIK_METRICS_PROMETHEUS: true
      # -- Let's Encrypt
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL: ${LETSENCRYPT_ACME_EMAIL}
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_STORAGE: /cert/acme.json
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_TLSCHALLENGE: true
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_CASERVER: ${LETSENCRYPT_ACME_CASERVER:-https://acme-v02.api.letsencrypt.org/directory}
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    networks:
      - proxy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    user: nobody:nobody
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

networks:
  proxy:
    name: proxy
    external: true

volumes:
  cert: {}
