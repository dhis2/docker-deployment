# Shared middleware definitions used by all per-instance route configs.
# This file is always present in conf.d/ and loaded by the standalone Traefik stack.

http:
  middlewares:
    security:
      headers:
        <<: &security-headers
          referrerPolicy: "strict-origin-when-cross-origin"
          frameDeny: true
          contentTypeNosniff: true
          browserXssFilter: true
        forceSTSHeader: true
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true

    # Same as 'security' but without HSTS. Used for internal/VPN-only routes served
    # with a self-signed CA — HSTS there would lock browsers out unrecoverably if a
    # client hits the route before trusting the CA.
    security-internal:
      headers:
        <<: *security-headers
