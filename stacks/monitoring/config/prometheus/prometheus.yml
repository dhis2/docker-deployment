global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # DHIS2 application metrics — one target file per instance added by `make start-instance`
  # All instances must use the same DHIS2_MONITOR_USERNAME and DHIS2_MONITOR_PASSWORD
  # (set in monitoring/.env and matching each instance's .env file).
  - job_name: 'dhis2'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/dhis2/*.json
        refresh_interval: 30s
    metrics_path: '/api/metrics'
    basic_auth:
      username: ${DHIS2_MONITOR_USERNAME}
      password_file: /run/secrets/dhis2_monitor_password

  # PostgreSQL metrics — one target file per instance added by `make start-instance`
  - job_name: 'postgres'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/postgres/*.json
        refresh_interval: 30s

  # Host metrics (runs once for the whole server)
  - job_name: 'node-exporter'
    static_configs:
      - targets: [ 'node-exporter:9100' ]

  # Container metrics (runs once for the whole server)
  - job_name: 'cadvisor'
    static_configs:
      - targets: [ 'cadvisor:8080' ]
