# Standalone monitoring stack for multi-instance deployments.
#
# Deploy this stack once before launching any DHIS2 instances:
#   make start-monitoring
#
# Per-instance scrape targets are added automatically to monitoring/targets/dhis2/ and
# monitoring/targets/postgres/ by `make start-instance` and removed by `make stop-instance`.
# Prometheus refreshes these directories every 30 seconds — no restart required.
#
# Loki is exposed on 127.0.0.1:3100 for the Docker logging driver. All instance containers
# using the shared-monitoring overlay push logs here with an `instance` label for filtering.
#
# NOTE: DHIS2_MONITOR_USERNAME and DHIS2_MONITOR_PASSWORD in this file's .env must match
# the values set in all instance .env files, since Prometheus uses a single shared credential.
#
# The monitoring_net and proxy external networks must exist before starting this stack:
#   make ensure-networks

x-healthcheck-options: &healthcheck-options
  interval: 10s
  timeout: 3s
  retries: 3
  start_period: 30s

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-10.0.0}
    volumes:
      - grafana:/var/lib/grafana
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SECURITY_DISABLE_GRAVATAR: true
      GF_ANALYTICS_REPORTING_ENABLED: false
      GF_ANALYTICS_CHECK_FOR_UPDATES: false
      GF_LOG_LEVEL: warn
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOSTNAME}
      GF_SERVER_SERVE_FROM_SUB_PATH: false
      DS_PROMETHEUS: prometheus
    networks:
      monitoring_internal:
      proxy:
        aliases:
          - monitoring-grafana
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      <<: *healthcheck-options
    user: 472:472
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true

  loki:
    image: grafana/loki:${LOKI_VERSION:-2.9.0}
    depends_on:
      loki-init:
        condition: service_completed_successfully
    volumes:
      - loki:/loki
    environment:
      LOKI_RETENTION_PERIOD: ${LOKI_RETENTION_PERIOD:-744h}
    # The Docker Logging Driver runs on the host network, so Loki must be exposed on it
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - monitoring_internal
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--quiet", "--output-document=/dev/null", "http://localhost:3100/ready" ]
      <<: *healthcheck-options
    user: nobody:nobody
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true

  loki-init:
    image: busybox:1.37.0
    volumes:
      - loki:/loki
    networks:
      - monitoring_internal
    command: [ "sh", "-c", "mkdir -p /loki/chunks /loki/rules /loki/wal /loki/boltdb-shipper-compactor && chown -R nobody:nobody /loki" ]
    user: root
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.45.0}
    volumes:
      - prometheus:/prometheus
      - ./targets/dhis2:/etc/prometheus/targets/dhis2:ro
      - ./targets/postgres:/etc/prometheus/targets/postgres:ro
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
        mode: 444
    secrets:
      - dhis2_monitor_password
    environment:
      PROMETHEUS_RETENTION_TIME: ${PROMETHEUS_RETENTION_TIME:-15d}
    networks:
      - monitoring_internal
      - monitoring_net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--quiet", "--output-document=/dev/null", "http://localhost:9090/-/healthy" ]
      <<: *healthcheck-options
    user: nobody:nobody
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-v1.6.1}
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring_internal
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host)($$|/)'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--quiet", "--output-document=/dev/null", "http://localhost:9100/metrics" ]
      <<: *healthcheck-options
    user: "65534:65534"
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:-v0.47.0}
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - monitoring_internal
    command:
      - --disable_metrics=disk,referenced_memory
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--quiet", "--output-document=/dev/null", "http://localhost:8080/metrics" ]
      <<: *healthcheck-options
    cap_drop:
      - ALL
    privileged: true
    security_opt:
      - no-new-privileges:true
    userns_mode: "host"

networks:
  monitoring_internal:
  monitoring_net:
    name: monitoring_net
    external: true
  proxy:
    name: proxy
    external: true

volumes:
  loki: {}
  prometheus: {}
  grafana: {}

secrets:
  dhis2_monitor_password:
    environment: DHIS2_MONITOR_PASSWORD

# Docker Compose performs variable substitution on configs.content, so
# ${DHIS2_MONITOR_USERNAME} is resolved from monitoring/.env at deploy time.
configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      scrape_configs:
        # DHIS2 application metrics — one target file per instance in targets/dhis2/
        # All instances must use the same DHIS2_MONITOR_USERNAME and DHIS2_MONITOR_PASSWORD.
        - job_name: 'dhis2'
          file_sd_configs:
            - files:
                - /etc/prometheus/targets/dhis2/*.json
              refresh_interval: 30s
          metrics_path: '/api/metrics'
          basic_auth:
            username: ${DHIS2_MONITOR_USERNAME}
            password_file: /run/secrets/dhis2_monitor_password

        # PostgreSQL metrics — one target file per instance in targets/postgres/
        - job_name: 'postgres'
          file_sd_configs:
            - files:
                - /etc/prometheus/targets/postgres/*.json
              refresh_interval: 30s

        # Host metrics (runs once for the whole server)
        - job_name: 'node-exporter'
          static_configs:
            - targets: [ 'node-exporter:9100' ]

        # Container metrics (runs once for the whole server)
        - job_name: 'cadvisor'
          static_configs:
            - targets: [ 'cadvisor:8080' ]
