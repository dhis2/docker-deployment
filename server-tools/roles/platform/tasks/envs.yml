# Generate the shared stack env files (stacks/traefik/.env, stacks/monitoring/.env).

- name: Assert Let's Encrypt email is configured
  ansible.builtin.assert:
    that:
      - letsencrypt_email is defined
      - letsencrypt_email | length > 0
    fail_msg: >-
      letsencrypt_email must be set in group_vars/all.yml.
      See server-tools/README.md for configuration.

- name: Generate shared stack env files
  ansible.builtin.shell: |
    export GEN_LETSENCRYPT_ACME_EMAIL="{{ letsencrypt_email }}"
    ./scripts/generate-stack-envs.sh
  args:
    chdir: "{{ deploy_dir }}"
    creates: "{{ deploy_dir }}/stacks/monitoring/.env"
