# Hosting platform role.
#
# Provisions the shared hosting stacks on a server already bootstrapped/hardened:
#   - Traefik gateway        (stacks/traefik)
#   - Monitoring stack        (stacks/monitoring: Prometheus, Loki, Grafana)
#   - WireGuard VPN           (overlays/wireguard) - optional, enable_vpn
#
# Per-instance DHIS2 deployment is intentionally NOT handled here; instances are
# managed with the `make` workflow (create-instance / start-instance).

- import_tasks: repo.yml
- import_tasks: envs.yml
- import_tasks: networks.yml
- import_tasks: loki.yml
- import_tasks: stacks.yml
- import_tasks: vpn.yml
  when: enable_vpn | default(true) | bool
