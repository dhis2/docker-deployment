# Clone or update the docker-deployment repository in the deploy directory.

- name: Check if deploy dir is a git repo
  ansible.builtin.stat:
    path: "{{ deploy_dir }}/.git"
  register: git_repo

- name: Check deploy dir contents
  ansible.builtin.find:
    paths: "{{ deploy_dir }}"
    file_type: any
  register: dir_contents

- name: Fail if deploy dir is not empty and not a git repo
  ansible.builtin.fail:
    msg: "Deploy directory {{ deploy_dir }} exists, is not empty, and is not a git repository. Remove it manually or resolve the conflict."
  when: not git_repo.stat.exists and dir_contents.matched > 0

- name: Clone the repository
  ansible.builtin.command: git clone {{ repo_url }} {{ deploy_dir }}
  args:
    creates: "{{ deploy_dir }}/.git"

- name: Add deploy directory to git safe directories
  ansible.builtin.command: git config --global --add safe.directory {{ deploy_dir }}
  changed_when: false

- name: Fetch all branches
  ansible.builtin.command: git fetch --all
  args:
    chdir: "{{ deploy_dir }}"
  changed_when: false

- name: Checkout the configured branch
  ansible.builtin.command: git checkout {{ repo_branch }}
  args:
    chdir: "{{ deploy_dir }}"
  register: git_checkout
  changed_when: "'Already on' not in git_checkout.stderr"

- name: Pull latest changes
  ansible.builtin.command: git pull --ff-only origin {{ repo_branch }}
  args:
    chdir: "{{ deploy_dir }}"
  register: git_pull
  changed_when: "'Already up to date' not in git_pull.stdout"
