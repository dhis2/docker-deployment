# Install and start the standalone WireGuard VPN stack (project name: wireguard).
# Only included when enable_vpn is true.
#
# On first start the mkcert container populates the wireguard-certs volume with
# the *.internal certificates Traefik serves. Traefik's file provider watches
# conf.d/ for YAML changes but not the cert files referenced inside them, so we
# touch internal.yml afterwards to force a reload that picks up the new certs.

- name: Build the WireGuard stack images (mkcert)
  ansible.builtin.command: docker compose -p wireguard -f overlays/wireguard/docker-compose.yml build
  args:
    chdir: "{{ deploy_dir }}"
  changed_when: false

- name: Install WireGuard systemd unit
  ansible.builtin.template:
    src: wireguard.service.j2
    dest: /etc/systemd/system/wireguard.service
    mode: "0644"
  notify:
    - reload systemd
    - restart wireguard

- name: Apply pending systemd unit changes
  ansible.builtin.meta: flush_handlers

- name: Enable and start WireGuard
  ansible.builtin.systemd:
    name: wireguard
    enabled: true
    state: started

- name: Force Traefik to reload the *.internal certificates
  ansible.builtin.file:
    path: "{{ deploy_dir }}/stacks/traefik/conf.d/internal.yml"
    state: touch
    mode: "0644"
  changed_when: false
