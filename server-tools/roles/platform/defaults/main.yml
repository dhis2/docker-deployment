# Default configuration for the hosting platform role.
# Override per deployment in group_vars/all.yml.

# Master switch for the platform role (gated in site.yml).
enable_platform: true

# Deploy the standalone WireGuard VPN stack and open its UDP port.
# When false, Grafana (which is VPN-only) is unreachable until a VPN is added.
enable_vpn: true

# Repository to deploy the hosting stacks from.
repo_url: https://github.com/dhis2/docker-deployment
repo_branch: master

# Let's Encrypt ACME registration email for the Traefik stack.
# REQUIRED: there is no sensible default, so this must be set in
# group_vars/all.yml. The platform role asserts it is non-empty.
letsencrypt_email: ""
