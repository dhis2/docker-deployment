- name: Update apt cache
  apt:
    update_cache: yes

- name: Install required packages
  apt:
    name:
      - git
      - curl
      - make
      - wget
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - unattended-upgrades
    state: present

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present

- name: Install Docker and Compose
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

# Operator user: the account that owns deploy_dir and runs `make` / `sudo docker`.
# By default this is the inventory ansible_user (already exists), so nothing is
# created. Set docker_user to a dedicated name in group_vars/all.yml to have a
# separate account provisioned (with a pre-hashed password and optional SSH key).
- name: Assert a password is provided for a dedicated operator user
  assert:
    that: docker_user_password is defined and docker_user_password | length > 0
    fail_msg: >-
      docker_user is set to a dedicated account ({{ docker_user }}) but
      docker_user_password is not set. Provide a pre-hashed password
      (e.g. `mkpasswd --method=sha-512`). See README.md.
  when: docker_user != ansible_user

- name: Create the operator user
  user:
    name: "{{ docker_user }}"
    password: "{{ docker_user_password }}"
    update_password: on_create
    groups: sudo
    append: yes
    shell: /bin/bash
    create_home: yes
  when: docker_user != ansible_user

- name: Add the operator user's SSH key
  authorized_key:
    user: "{{ docker_user }}"
    key: "{{ docker_user_ssh_key }}"
  when:
    - docker_user != ansible_user
    - docker_user_ssh_key is defined
    - docker_user_ssh_key | length > 0

- name: Ensure deploy directory exists
  file:
    path: "{{ deploy_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: '0755'

- name: Enable and start Docker service
  service:
    name: docker
    state: started
    enabled: yes
