# Default infrastructure variables shared across roles.
# bootstrap runs first, so these defaults are in scope for the firewall,
# harden and repo roles too. Override per deployment in group_vars/all.yml.

# The operational user: owns deploy_dir, runs `make` / `sudo docker`, and is the
# Docker user-namespace remap target. Defaults to the inventory ansible_user.
# To use a dedicated account instead, set operator_user (+ operator_user_password,
# and optionally operator_user_ssh_key) in group_vars/all.yml.
operator_user: "{{ ansible_user }}"

# Where the docker-deployment repository is checked out on the target host.
deploy_dir: /opt/dhis2
