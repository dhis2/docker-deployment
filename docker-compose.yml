x-database-image: &database-image
  image: postgis/postgis:${POSTGRES_VERSION:-16-master}

x-healthcheck-options: &healthcheck-options
  interval: 10s
  timeout: 3s
  retries: 3
  start_period: 30s

x-loki-logging: &loki-logging
  driver: loki
  options:
    loki-url: "http://localhost:3100/loki/api/v1/push"
    loki-timeout: "1s"
    loki-retries: "2"
    loki-external-labels: "instance=${COMPOSE_PROJECT_NAME}"

services:
  app:
    image: dhis2/core:${DHIS2_VERSION:-42}
    volumes:
      - dhis2:/opt/dhis2/
      #- ./config/dhis2/log4j2.xml:/opt/dhis2/log4j2.xml:ro
      - ./config/dhis2/dhis.conf:/opt/dhis2/dhis.conf:ro
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 1000000
      - type: tmpfs
        target: /usr/local/tomcat/temp
        tmpfs:
          size: 100000000
      - type: tmpfs
        target: /usr/local/tomcat/logs
        tmpfs:
          size: 1000000
      - type: tmpfs
        target: /usr/local/tomcat/work/Catalina/localhost/ROOT
        tmpfs:
          size: 1000000
    environment:
      # -- Name of the database to use
      POSTGRES_DB: ${POSTGRES_DB:-dhis}
      # -- Database username
      POSTGRES_DB_USERNAME: ${POSTGRES_DB_USERNAME}
      # -- Database password
      POSTGRES_DB_PASSWORD: ${POSTGRES_DB_PASSWORD}
      # -- Enable system audit logging
      SYSTEM_AUDIT_ENABLED: ${SYSTEM_AUDIT_ENABLED:-off}
      MONITORING_API_ENABLED: on
      MONITORING_JVM_ENABLED: on
      MONITORING_DBPOOL_ENABLED: on
      MONITORING_HIBERNATE_ENABLED: on
      MONITORING_UPTIME_ENABLED: on
      MONITORING_CPU_ENABLED: on
    networks:
      application:
      database:
      proxy:
        aliases:
          - "${COMPOSE_PROJECT_NAME}-app"
      monitoring:
        aliases:
          - "${COMPOSE_PROJECT_NAME}-app"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8080/dhis-web-login/" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 120s
    logging: *loki-logging
    user: 65534:65534
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true

  update-admin-password:
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./scripts/update-admin-password.sh:/update-admin-password.sh:ro
    environment:
      # -- Database hostname
      POSTGRES_HOST: database
      # -- Postgres user password
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # -- Name of the database
      POSTGRES_DB: ${POSTGRES_DB:-dhis}
      # -- DHIS2 admin username
      DHIS2_ADMIN_USERNAME: ${DHIS2_ADMIN_USERNAME}
      # -- DHIS2 admin password
      DHIS2_ADMIN_PASSWORD: ${DHIS2_ADMIN_PASSWORD}
    networks:
      - database
    entrypoint: [ "/bin/sh", "/update-admin-password.sh" ]
    working_dir: /root
    logging: *loki-logging
    <<: *database-image
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # Creates the DHIS2 monitoring user used by Prometheus to scrape /api/metrics.
  # Runs once per instance after the admin password is set.
  create-monitoring-user:
    image: alpine:3.22
    depends_on:
      update-admin-password:
        condition: service_completed_successfully
    volumes:
      - ./scripts/create-monitoring-user.sh:/create-monitoring-user.sh:ro
    environment:
      DHIS2_HOSTNAME: ${DHIS2_HOSTNAME:-http://app:8080}
      DHIS2_ADMIN_USERNAME: ${DHIS2_ADMIN_USERNAME}
      DHIS2_ADMIN_PASSWORD: ${DHIS2_ADMIN_PASSWORD}
      DHIS2_MONITOR_USERNAME: ${DHIS2_MONITOR_USERNAME}
      DHIS2_MONITOR_PASSWORD: ${DHIS2_MONITOR_PASSWORD}
    networks:
      - application
    entrypoint: [ "/bin/sh", "/create-monitoring-user.sh" ]
    logging: *loki-logging
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # Exports PostgreSQL metrics for Prometheus scraping.
  # Attached to monitoring with a predictable alias for the shared Prometheus.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:${POSTGRES_EXPORTER_VERSION:-v0.17.1}
    depends_on:
      create-monitoring-user:
        condition: service_completed_successfully
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_METRICS_USERNAME}:${POSTGRES_METRICS_PASSWORD}@database:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      database:
      monitoring:
        aliases:
          - "${COMPOSE_PROJECT_NAME}-postgres-exporter"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--quiet", "--output-document=/dev/null", "http://localhost:9187/metrics" ]
      <<: *healthcheck-options
    logging: *loki-logging
    user: nobody:nobody
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true

networks:
  application:
  database:
    name: ${COMPOSE_PROJECT_NAME}-db
    external: true
  proxy:
    name: proxy
    external: true
  monitoring:
    name: monitoring
    external: true

volumes:
  dhis2: {}
